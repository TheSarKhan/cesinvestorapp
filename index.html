<!doctype html>
<html lang="az">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Invorent · İnvestor Portalı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    background: #15181D;
  }
  #root { width: 100%; height: 100vh; }

  .stage {
    width: 100%; height: 100vh;
    display: grid; place-items: center;
    background:
      radial-gradient(ellipse 70% 50% at 50% -5%, rgba(217,119,6,0.10), transparent 60%),
      #1B1F25;
    position: relative;
    overflow: hidden;
  }
  .stage::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 46px 46px;
    pointer-events: none;
  }
  .brand-tag {
    position: absolute; top: 22px; left: 26px;
    display: flex; align-items: center; gap: 9px;
    color: rgba(255,255,255,0.55); font-size: 13px; font-weight: 600;
    letter-spacing: -0.01em;
  }
  .brand-tag .dot {
    width: 8px; height: 8px; border-radius: 3px; background: #D97706;
    box-shadow: 0 0 12px #D97706;
  }
  .caption {
    position: absolute; bottom: 20px; left: 0; right: 0; text-align: center;
    color: rgba(255,255,255,0.34); font-size: 11.5px; font-weight: 600;
    letter-spacing: 0.01em;
  }

  .device {
    width: 390px; height: 844px;
    background: #F4F5F7;
    border-radius: 52px;
    position: relative; overflow: hidden;
    box-shadow:
      0 50px 100px rgba(0,0,0,0.5),
      0 0 0 11px #0C0E12,
      0 0 0 13px #2A2F38;
  }
  .notch {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 116px; height: 32px; border-radius: 20px; background: #0C0E12; z-index: 40;
  }
  .home-ind {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 130px; height: 5px; border-radius: 100px; background: rgba(20,24,33,0.32);
    z-index: 45; pointer-events: none;
  }

  .scrollwrap::-webkit-scrollbar, .noscroll::-webkit-scrollbar { display: none; }
  .scrollwrap, .noscroll { scrollbar-width: none; -ms-overflow-style: none; }

  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; }
  input::placeholder, textarea::placeholder { color: #9AA1AC; }

  /* Scale down on short viewports */
  @media (max-height: 880px) {
    .device { transform: scale(calc((100vh - 40px) / 844)); }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
