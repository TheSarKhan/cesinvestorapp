# Invorent · İnvestor Portalı — static site (in-browser Babel, no build step)
[build]
  publish = "."
  command = ""

# JSX files are loaded at runtime by @babel/standalone — serve them as plain text.
[[headers]]
  for = "/*.jsx"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
